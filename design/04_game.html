<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GRID CLASH - Game Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: { extend: {
            "colors": {"on-primary": "#006165","primary-container": "#00f4fe","on-secondary": "#4f5066","surface-container-lowest": "#000000","surface-dim": "#0b0c1f","surface-container-highest": "#22233e","error-container": "#9f0519","on-primary-container": "#00575b","surface": "#0b0c1f","tertiary-dim": "#41a3f7","outline": "#73738b","primary-dim": "#00e5ee","surface-container": "#16172e","surface-bright": "#282947","error": "#ff716c","on-surface-variant": "#a9a9c2","tertiary": "#64b3ff","background": "#0b0c1f","primary": "#a1faff","on-background": "#e4e3fe","surface-variant": "#22233e","on-error": "#490006","inverse-primary": "#006a6e","on-tertiary": "#003053","surface-container-high": "#1c1d36","surface-tint": "#a1faff","on-surface": "#e4e3fe","primary-fixed": "#00f4fe","outline-variant": "#46465b","secondary": "#e1e0fb","surface-container-low": "#101126"},
            "borderRadius": {"DEFAULT": "1rem","lg": "2rem","xl": "3rem","full": "9999px"},
            "fontFamily": {"headline": ["Space Grotesk"],"body": ["Inter"],"label": ["Inter"]}
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glow-cyan { box-shadow: 0 0 15px rgba(0, 245, 255, 0.2); }
        .glass-panel { background: rgba(16, 17, 38, 0.7); backdrop-filter: blur(12px); }
        body { min-height: max(884px, 100dvh); }
    </style>
</head>
<body class="bg-background text-on-surface font-body">
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#0b0c1f]">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#1c1d36] transition-colors text-[#00F5FF]"><span class="material-symbols-outlined">arrow_back</span></button>
<h1 class="text-[#00F5FF] font-['Space_Grotesk'] font-bold tracking-tight text-xl">GRID CLASH</h1>
</div>
<div class="flex items-center gap-3 bg-[#101126] px-4 py-2 rounded-full border border-outline-variant/15">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label text-xs font-medium uppercase tracking-widest text-primary">Your Turn</span>
</div>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 flex flex-col items-center justify-center gap-12 overflow-hidden">
<!-- Scoreboard -->
<div class="w-full max-w-md grid grid-cols-2 gap-4">
<div class="surface-container-high p-4 rounded-lg flex flex-col items-center justify-center gap-1 border-b-2 border-primary">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Player 1</span>
<span class="font-headline text-3xl font-black text-primary">02</span>
</div>
<div class="surface-container-low p-4 rounded-lg flex flex-col items-center justify-center gap-1 border-b-2 border-transparent">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Neural AI</span>
<span class="font-headline text-3xl font-black text-on-surface">01</span>
</div>
</div>
<!-- Game Board -->
<div class="relative group">
<div class="absolute -inset-8 bg-primary/5 blur-[60px] rounded-full pointer-events-none"></div>
<div class="relative glass-panel p-6 rounded-[2.5rem] shadow-[0_0_50px_rgba(0,245,255,0.05)] border border-outline-variant/10">
<div class="grid grid-cols-3 gap-3 w-72 h-72">
<!-- Row 1 -->
<button class="relative bg-[#22233e] rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200"><span class="material-symbols-outlined text-4xl text-primary drop-shadow-[0_0_8px_rgba(0,245,255,0.6)]" style="font-variation-settings: 'FILL' 1;">close</span></button>
<button class="relative bg-[#22233e] rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200 group"><div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity rounded-2xl border border-primary/20"></div></button>
<button class="relative bg-[#22233e] rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200"><span class="material-symbols-outlined text-4xl text-tertiary drop-shadow-[0_0_8px_rgba(65,163,247,0.6)]" style="font-variation-settings: 'FILL' 1;">circle</span></button>
<!-- Row 2 -->
<button class="relative bg-[#22233e] rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200"></button>
<button class="relative bg-gradient-to-br from-primary/20 to-primary-container/10 rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200 border border-primary/40 glow-cyan"><span class="material-symbols-outlined text-4xl text-primary drop-shadow-[0_0_12px_rgba(0,245,255,0.8)]" style="font-variation-settings: 'FILL' 1;">close</span></button>
<button class="relative bg-[#22233e] rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200"></button>
<!-- Row 3 -->
<button class="relative bg-[#22233e] rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200"><span class="material-symbols-outlined text-4xl text-tertiary drop-shadow-[0_0_8px_rgba(65,163,247,0.6)]" style="font-variation-settings: 'FILL' 1;">circle</span></button>
<button class="relative bg-[#22233e] rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200"></button>
<button class="relative bg-[#22233e] rounded-2xl flex items-center justify-center active:scale-90 transition-all duration-200"><span class="material-symbols-outlined text-4xl text-primary drop-shadow-[0_0_8px_rgba(0,245,255,0.6)]" style="font-variation-settings: 'FILL' 1;">close</span></button>
</div>
</div>
</div>
<!-- HUD -->
<div class="flex flex-col items-center gap-6 w-full max-w-md">
<p class="font-label text-sm text-on-surface-variant">Next suggested move: <span class="text-primary-dim font-bold">Center-Left</span></p>
<div class="flex items-center gap-4 w-full">
<button class="flex-1 py-4 px-6 rounded-xl bg-surface-container-highest text-on-surface font-label font-semibold flex items-center justify-center gap-2 hover:bg-surface-bright transition-all active:scale-95"><span class="material-symbols-outlined text-xl">refresh</span>Reset</button>
<button class="flex-[2] py-4 px-6 rounded-xl bg-gradient-to-br from-[#a1faff] to-[#00f4fe] text-[#0b0c1f] font-label font-bold flex items-center justify-center gap-2 shadow-[0_8px_24px_rgba(0,245,255,0.25)] active:scale-95 transition-all"><span class="material-symbols-outlined text-xl">bolt</span>Quick Solve</button>
</div>
</div>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-4 bg-[#101126]/70 backdrop-blur-xl rounded-t-[3rem] shadow-[0_-8px_40px_rgba(0,245,255,0.08)]">
<a class="flex items-center justify-center text-[#e4e3fe]/40 p-3" href="#"><span class="material-symbols-outlined">home</span></a>
<a class="flex items-center justify-center bg-gradient-to-br from-[#a1faff] to-[#00f4fe] text-[#0b0c1f] rounded-full p-3" href="#"><span class="material-symbols-outlined">videogame_asset</span></a>
<a class="flex items-center justify-center text-[#e4e3fe]/40 p-3" href="#"><span class="material-symbols-outlined">group</span></a>
<a class="flex items-center justify-center text-[#e4e3fe]/40 p-3" href="#"><span class="material-symbols-outlined">settings</span></a>
</nav>
<div class="fixed top-1/4 -right-24 w-96 h-96 bg-primary/5 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-1/4 -left-24 w-96 h-96 bg-tertiary/5 blur-[120px] rounded-full -z-10"></div>
</body></html>

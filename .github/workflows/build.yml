name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Remplace le gradlew par un propre téléchargé depuis Gradle officiel (évite CRLF)
      - name: Download clean gradlew from Gradle official
        run: |
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradlew" -o gradlew
          chmod +x gradlew

      # Télécharger gradle-wrapper.jar si absent
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            curl -fsSL "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" -o "$JAR"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GridClash-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Grid Clash Build #${{ github.run_number }}"
          body: |
            Télécharge `app-debug.apk` et installe sur Android.

            1. Télécharge le fichier ci-dessous
            2. Sur ton téléphone : Paramètres → Sécurité → Sources inconnues → Activer
            3. Ouvre l'APK et installe
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

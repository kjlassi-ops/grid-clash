name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # permet de déclencher manuellement depuis GitHub

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout du code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Télécharger gradle-wrapper.jar si absent ───────────────────────
      - name: Download Gradle wrapper jar if missing
        run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ]; then
            mkdir -p gradle/wrapper
            curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
          fi

      # ── 5. Permissions + fix fins de ligne Windows (CRLF → LF) ──────────
      - name: Fix gradlew line endings and permissions
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      # ── 6. Build APK debug ────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Upload APK en artifact téléchargeable ──────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GridClash-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 7. (Optionnel) Créer une Release GitHub avec l'APK ────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Grid Clash Build #${{ github.run_number }}"
          body: |
            ## Grid Clash — Build automatique

            **Commit :** ${{ github.sha }}
            **Date :** ${{ github.event.head_commit.timestamp }}

            ### Comment installer sur Android
            1. Télécharge le fichier `app-debug.apk` ci-dessous
            2. Sur ton téléphone : **Paramètres → Sécurité → Sources inconnues** → Activer
            3. Ouvre le fichier APK téléchargé et installe
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
